<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your love</title>
    <!-- استيراد الخطوط الرومانسية -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- استيراد مكتبة Tailwind للتنسيق السريع -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #fff0f3;
            --deep-red: #590d22;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe4e6 100%);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            color: var(--deep-red);
        }

        .serif-font {
            font-family: 'Amiri', serif;
        }

        /* تأثير نبض القلب */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        .heart-pulse {
            animation: heartBeat 1.5s infinite ease-in-out;
        }

        /* تأثير القلوب المتطايرة */
        .floating-heart {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            z-index: 1;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* بطاقات الوقت */
        .time-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 182, 193, 0.4);
            border-radius: 2rem;
            transition: all 0.3s ease;
        }

        .time-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.1);
        }

        .highlight-card {
            background: var(--primary-pink);
            color: white;
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.3);
            border: none;
        }

        /* إخفاء شريط التمرير */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <!-- حاوية القلوب المتطايرة -->
    <div id="hearts-container"></div>

    <main class="relative z-10 flex flex-col items-center justify-center min-h-screen p-6 text-center">
        <div class="max-w-3xl w-full bg-white/30 backdrop-blur-sm p-8 md:p-12 rounded-[3rem] border border-white/50 shadow-2xl">
            
            <!-- الرأس -->
            <header class="mb-12">
                <div class="heart-pulse inline-block mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="#ff4d6d" stroke="#ff4d6d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </div>
                <h1 class="text-5xl md:text-7xl serif-font font-bold mb-4 text-rose-900">حكايتنا معاً</h1>
                <p class="text-rose-600 font-medium italic text-xl">كل ثانية معك هي عمر جديد</p>
            </header>

            <!-- شبكة العداد -->
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6 mb-12">
                <div class="time-card p-6">
                    <div class="text-rose-400 mb-2">
                        <svg class="mx-auto" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                    </div>
                    <div id="months" class="text-4xl font-bold mb-1">0</div>
                    <div class="text-xs uppercase tracking-widest font-bold text-rose-500/60">شهور</div>
                </div>

                <div class="time-card p-6">
                    <div class="text-rose-400 mb-2">
                        <svg class="mx-auto" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                    </div>
                    <div id="days" class="text-4xl font-bold mb-1">0</div>
                    <div class="text-xs uppercase tracking-widest font-bold text-rose-500/60">أيام</div>
                </div>

                <div class="time-card p-6">
                    <div class="text-rose-400 mb-2">
                        <svg class="mx-auto" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div id="hours" class="text-4xl font-bold mb-1">0</div>
                    <div class="text-xs uppercase tracking-widest font-bold text-rose-500/60">ساعات</div>
                </div>

                <div class="time-card p-6">
                    <div class="text-rose-400 mb-2">
                        <svg class="mx-auto" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div id="minutes" class="text-4xl font-bold mb-1">0</div>
                    <div class="text-xs uppercase tracking-widest font-bold text-rose-500/60">دقائق</div>
                </div>

                <div class="time-card p-6">
                    <div class="text-rose-500 mb-2">
                        <svg class="mx-auto" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    </div>
                    <div id="seconds" class="text-4xl font-bold mb-1 text-rose-500">0</div>
                    <div class="text-xs uppercase tracking-widest font-bold text-rose-500/60">ثواني</div>
                </div>

                <div class="time-card highlight-card p-6">
                    <div class="text-rose-100 mb-2">
                        <svg class="mx-auto" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                    </div>
                    <div id="totalDays" class="text-4xl font-bold mb-1">0</div>
                    <div class="text-xs uppercase tracking-widest font-bold text-rose-100">إجمالي الأيام</div>
                </div>
            </div>

            <!-- التذييل -->
            <footer class="space-y-6">
                <div class="flex items-center justify-center gap-4">
                    <div class="h-[1px] bg-rose-200 flex-1"></div>
                    <p class="text-rose-400 text-sm uppercase tracking-[0.2em] font-bold">منذ 5 أبريل 2026</p>
                    <div class="h-[1px] bg-rose-200 flex-1"></div>
                </div>
                <p class="text-2xl serif-font italic text-rose-800 leading-relaxed">
                    "أنت لست مجرد شخص في حياتي، أنت الحياة التي أعيشها."
                </p>
            </footer>
        </div>
    </main>

    <script>
        // تاريخ البداية
        const startDate = new Date('2026-04-05T00:00:00');

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            if (diff < 0) return;

            const totalSeconds = Math.floor(diff / 1000);
            const seconds = totalSeconds % 60;
            const totalMinutes = Math.floor(totalSeconds / 60);
            const minutes = totalMinutes % 60;
            const totalHours = Math.floor(totalMinutes / 60);
            const hours = totalHours % 24;
            const totalDays = Math.floor(totalHours / 24);

            // حساب الشهور (تقريبي)
            const months = Math.floor(totalDays / 30.44);
            const remainingDays = Math.floor(totalDays % 30.44);

            // تحديث الواجهة
            document.getElementById('months').innerText = months;
            document.getElementById('days').innerText = remainingDays;
            document.getElementById('hours').innerText = hours;
            document.getElementById('minutes').innerText = minutes;
            document.getElementById('seconds').innerText = seconds;
            document.getElementById('totalDays').innerText = totalDays;
        }

        // إنشاء قلوب متطايرة
        function createHeart() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#fb7185" opacity="0.4"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`;
            
            const x = Math.random() * 100;
            const size = Math.random() * 20 + 10;
            const duration = Math.random() * 5 + 5;

            heart.style.left = x + 'vw';
            heart.style.fontSize = size + 'px';
            heart.style.animationDuration = duration + 's';

            container.appendChild(heart);

            // حذف القلب بعد انتهاء الحركة
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // تشغيل العداد
        setInterval(updateTimer, 1000);
        updateTimer();

        // تشغيل القلوب
        setInterval(createHeart, 1000);
    </script>
</body>
</html>
